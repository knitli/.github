#
# Caller workflow for the Knitli Agent Issue Triage bot.
#
# Copy this file into a target repository at:
#   .github/workflows/claude-issue-triage.yml
#
# All triggering, identity, permission down-scoping, and tool gating live in the
# reusable workflow at knitli/.github. This caller just wires up the events and
# inherits the org-level secrets (KNITLI_AGENT_CLIENT_ID, KNITLI_AGENT_PRIVATE_KEY,
# CLAUDE_CODE_OAUTH_TOKEN).

name: Claude Issue Triage

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

jobs:
  triage:
    permissions:
      contents: read
      issues: write
      pull-requests: read
      id-token: write
      actions: read
      checks: read
    uses: knitli/.github/.github/workflows/claude-issue-triage.yml@main
    secrets: inherit
    # Optional overrides:
    # with:
    #   triage_alias: '@knitli-triage'
    #   model: 'claude-opus-4-8'
