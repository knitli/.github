#
# Caller workflow for the Knitli Agent PR Reviewer.
#
# Copy this file into a target repository at:
#   .github/workflows/claude-pr-reviewer.yml
#
# All triggering, identity, permission down-scoping, and tool gating live in the
# reusable workflow at knitli/.github. This caller just wires up the events and
# inherits the org-level secrets (KNITLI_AGENT_APP_ID, KNITLI_AGENT_PRIVATE_KEY,
# CLAUDE_CODE_OAUTH_TOKEN).
#
# Note: `pull_request` (not `pull_request_target`) means reviews on PRs from
# forks are intentionally skipped — fork PRs have no access to secrets. See the
# plan's "Deferred" section before changing this.

name: Claude PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    permissions:
      contents: read
      pull-requests: read
      id-token: write
    uses: knitli/.github/.github/workflows/claude-pr-reviewer.yml@main
    secrets: inherit
    # Optional overrides:
    # with:
    #   review_alias: '@knitli-review'
    #   model: 'claude-opus-4-8'
