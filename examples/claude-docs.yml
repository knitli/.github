#
# Caller workflow for the Knitli Agent Docs bot.
#
# Copy this file into a target repository at:
#   .github/workflows/claude-docs.yml
#
# All triggering, identity, permission down-scoping, and tool gating live in the
# reusable workflow at knitli/.github. This caller just wires up the events and
# inherits the org-level secrets (KNITLI_AGENT_CLIENT_ID, KNITLI_AGENT_PRIVATE_KEY,
# CLAUDE_CODE_OAUTH_TOKEN).
#
# On-demand only: mention @knitli-docs in a comment on an issue or PR.

name: Claude Docs

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  docs:
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read
      checks: read
    uses: knitli/.github/.github/workflows/claude-docs.yml@main
    secrets: inherit
    # Optional overrides:
    # with:
    #   docs_alias: '@knitli-docs'
    #   model: 'claude-opus-4-8'
