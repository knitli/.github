#
# British -> American spelling dictionary for the "teaparty" workflow.
#
# Keys and values are lowercase; scripts/teaparty/replace.py preserves the
# original token's capitalization pattern (lower / Capitalized / UPPER / and
# the inner boundary of a camelCase identifier like `backgroundColour`) when
# it applies a replacement, so you only ever need one entry per word form.
#
# Every inflected form (plurals, -ed, -ing, -er/-or, -ation) is listed
# explicitly rather than derived by regex suffix-stripping. That costs more
# lines but avoids the false positives a suffix rule would introduce (e.g.
# stripping "-ed" from "aged" or "-ing" from "sing"). Add new forms here as
# they're found rather than trying to be clever about morphology.
#
# Deliberately EXCLUDED (same spelling is standard American English too, or
# the word is genuinely ambiguous with an unrelated American word/meaning):
#   - analyse/analyses: "analyses" is also the standard plural of the noun
#     "analysis" in American English (only the verb "analyses" -> "analyzes"
#     is British-only, and the two are not distinguishable by spelling alone)
#   - catalogue, dialogue, analogue, prologue, epilogue: "-ogue" spellings
#     are standard American English too in general prose; only the
#     computing-specific "catalog"/"dialog"/"analog" shorthand is
#     American-only, and that's a register choice, not a spelling error
#   - programme: American "program" covers both meanings, but "programme"
#     (e.g. "a programme of events") is not a spelling *error* so much as a
#     dialect choice outside code; low value/low risk either way, skipped
#   - burnt, smelt, leapt: each collides with an unrelated American word or
#     usage ("burnt orange" is standard American too; "smelt" is a fish/ore
#     verb; "leapt" is accepted in American English as well)
#   - storey: floor-of-a-building sense is unambiguous, but the word is rare
#     enough in code/docs that it wasn't worth the entry; add if it shows up

